services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rankeriq
      POSTGRES_USER: rankeriq
      POSTGRES_PASSWORD: rankeriq_local_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rankeriq"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
